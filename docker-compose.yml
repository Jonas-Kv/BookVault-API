services:
  db:
    container_name:  bookvault_api_db_container
    image:  postgres:latest
    environment:
      POSTGRES_USER:  ${DB_USERNAME}
      POSTGRES_PASSWORD:  ${DB_PASSWORD}
      POSTGRES_DB:  bookvault_api_db
    ports:
      -  "5331:5432"
    volumes:
      -  db-data:/var/lib/postgresql

volumes:
  db-data: